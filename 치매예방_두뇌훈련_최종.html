<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🧠 치매예방 두뇌훈련</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; }
.wrap { background: white; width: 340px; padding: 1.4rem 1.2rem; border-radius: 20px; box-shadow: 0 6px 24px rgba(0,0,0,0.15); }
.ch-name { text-align: center; font-size: 13px; color: #999; margin-bottom: 4px; }
.theme { text-align: center; font-size: 18px; font-weight: 700; color: #111; margin-bottom: 5px; }
.direction { text-align: center; font-size: 12px; color: #666; margin-bottom: 12px; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: repeat(6, 52px); grid-template-rows: repeat(6, 52px); margin: 0 auto; width: 312px; }
.cell { width: 52px; height: 52px; border: 2.5px solid #111; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #111; background: white; transition: background 0.5s, color 0.5s; }
.cell.c1 { background: #378ADD; color: white; }
.cell.c2 { background: #1D9E75; color: white; }
.cell.c3 { background: #E24B4A; color: white; }
.words { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 12px; min-height: 34px; }
.wtag { font-size: 15px; font-weight: 700; padding: 6px 16px; border-radius: 99px; }
.wtag.c1 { background: #378ADD; color: white; }
.wtag.c2 { background: #1D9E75; color: white; }
.wtag.c3 { background: #E24B4A; color: white; }
.msg { text-align: center; font-size: 13px; color: #1D9E75; font-weight: 700; min-height: 22px; margin-top: 8px; }
.btn-row { display: flex; gap: 10px; margin-top: 12px; }
.btn { flex: 1; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 12px; cursor: pointer; border: none; color: white; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn.new { background: #444444; }
.btn.rev { background: #E24B4A; }
.btn:disabled { background: #cccccc; cursor: default; }
.like-area { text-align: center; margin-top: 16px; padding-top: 14px; border-top: 2px solid #f0f0f0; }
.like-btn { background: white; border: 2.5px solid #E24B4A; border-radius: 99px; padding: 10px 32px; font-size: 20px; cursor: pointer; color: #E24B4A; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
.like-btn.on { background: #E24B4A; color: white; transform: scale(1.06); }
.like-lbl { font-size: 12px; color: #aaa; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="ch-name">🧠 치매예방 두뇌훈련</div>
  <div class="theme" id="tt"></div>
  <div class="direction">→ 가로 &nbsp;|&nbsp; ↓ 세로 &nbsp;|&nbsp; ↘↙ 대각선</div>
  <div class="grid" id="grid"></div>
  <div class="words" id="tags"></div>
  <div class="msg" id="msg"></div>
  <div class="btn-row">
    <button class="btn new" onclick="gen()">🔄 새 문제</button>
    <button class="btn rev" id="rb" onclick="rev()">✨ 정답 공개</button>
  </div>
  <div class="like-area">
    <button class="like-btn" id="lb" onclick="lk()">❤️ <span id="lc">0</span></button>
    <div class="like-lbl">재밌었다면 하트를 눌러주세요!</div>
  </div>
</div>

<script>
const S=6;
const F=['약','밥','집','책','목','잡','칸','팔','벽','탁','막','각','학','작','착','딱','락','박','콩','팥','죽','쌀','국','떡','곱','탑','컵','삽','톱','솥','귀','뒤','쥐','취','튀','외','왜','위','의','볼','갑','납','답','잣','닷','맛','봇','솟','갓','낫','못','헛','뜻','빛'];
const TH=[
  {t:'🌸 봄 하면 생각나는 것',w:['벚꽃','개나리','나비']},
  {t:'☀️ 여름 하면 생각나는 것',w:['수박','모기','해수욕장']},
  {t:'🍂 가을 하면 생각나는 것',w:['단풍','고구마','독서']},
  {t:'❄️ 겨울 하면 생각나는 것',w:['눈사람','군고구마','패딩']},
  {t:'🎉 명절 하면 생각나는 것',w:['송편','보름달','차례']},
  {t:'🍚 밥상 위에 있는 것',w:['김치','된장찌개','숟가락']},
  {t:'🏥 건강에 좋은 것',w:['운동','수면','채소']},
  {t:'🧠 치매예방에 좋은 것',w:['독서','운동','대화']},
  {t:'🎵 노래방 가면 부르는 것',w:['트로트','마이크','박수']},
  {t:'🌊 바다 하면 생각나는 것',w:['갈매기','파도','조개']},
];
const C=['c1','c2','c3'],D=[[0,1],[1,0],[1,1],[1,-1]];
let ti=0,g=[],pl=[],done=false,liked=false,likeCount=0;
const ri=n=>Math.floor(Math.random()*n),fc=()=>F[ri(F.length)];
const gz=i=>[{rn:0,rx:2,cn:0,cx:2},{rn:0,rx:2,cn:3,cx:5},{rn:3,rx:5,cn:0,cx:2},{rn:3,rx:5,cn:3,cx:5}][i%4];

function cp(gr,w,r,c,dr,dc){
  for(let i=0;i<w.length;i++){
    const nr=r+dr*i,nc=c+dc*i;
    if(nr<0||nr>=S||nc<0||nc>=S)return false;
    if(gr[nr][nc]!==''&&gr[nr][nc]!==w[i])return false;
  }
  return true;
}

function gen(){
  done=false;liked=false;
  document.getElementById('msg').textContent='';
  document.getElementById('tags').innerHTML='';
  const rb=document.getElementById('rb');
  rb.disabled=false;
  document.getElementById('lb').className='like-btn';

  const th=TH[ti%TH.length];ti++;
  g=[];
  for(let r=0;r<S;r++){g.push([]);for(let c=0;c<S;c++)g[r].push('');}
  pl=[];

  const zo=[0,1,2,3].sort(()=>Math.random()-0.5);
  for(let wi=0;wi<th.w.length;wi++){
    const word=th.w[wi];let ok=false;
    const z=gz(zo[wi]);
    for(let a=0;a<400&&!ok;a++){
      const [dr,dc]=D[ri(D.length)];
      const r=z.rn+ri(z.rx-z.rn+1),c=z.cn+ri(z.cx-z.cn+1);
      if(cp(g,word,r,c,dr,dc)){
        const cs=[];
        for(let i=0;i<word.length;i++){g[r+dr*i][c+dc*i]=word[i];cs.push([r+dr*i,c+dc*i]);}
        pl.push({word,cs,col:C[wi%3]});ok=true;
      }
    }
    if(!ok){
      for(let a=0;a<400&&!ok;a++){
        const [dr,dc]=D[ri(D.length)],r=ri(S),c=ri(S);
        if(cp(g,word,r,c,dr,dc)){
          const cs=[];
          for(let i=0;i<word.length;i++){g[r+dr*i][c+dc*i]=word[i];cs.push([r+dr*i,c+dc*i]);}
          pl.push({word,cs,col:C[wi%3]});ok=true;
        }
      }
    }
  }

  for(let r=0;r<S;r++)for(let c=0;c<S;c++){
    if(!g[r][c]){
      let ch,t=0;
      do{ch=fc();t++;}
      while(t<15&&((r>0&&g[r-1][c]===ch)||(c>0&&g[r][c-1]===ch)));
      g[r][c]=ch;
    }
  }

  document.getElementById('tt').textContent=th.t;
  const gr=document.getElementById('grid');gr.innerHTML='';
  for(let r=0;r<S;r++)for(let c=0;c<S;c++){
    const d=document.createElement('div');
    d.className='cell';d.id=`c${r}_${c}`;d.textContent=g[r][c];
    gr.appendChild(d);
  }
}

function rev(){
  if(done)return;done=true;
  document.getElementById('rb').disabled=true;
  const tw=document.getElementById('tags');tw.innerHTML='';
  pl.forEach(p=>{
    p.cs.forEach(([r,c])=>document.getElementById(`c${r}_${c}`).classList.add(p.col));
    const t=document.createElement('span');
    t.className='wtag '+p.col;t.textContent=p.word;
    tw.appendChild(t);
  });
  document.getElementById('msg').textContent='😊 몇 개 찾으셨나요? 하트 눌러주세요!';
}

function lk(){
  liked=!liked;
  likeCount=liked?likeCount+1:Math.max(0,likeCount-1);
  document.getElementById('lc').textContent=likeCount;
  document.getElementById('lb').className='like-btn'+(liked?' on':'');
  if(liked)document.getElementById('msg').textContent='❤️ 감사합니다! 구독도 눌러주세요 😊';
}

gen();
</script>
</body>
</html>
